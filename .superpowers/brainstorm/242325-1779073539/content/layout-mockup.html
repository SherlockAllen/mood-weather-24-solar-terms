<h2>全屏轮播布局示意</h2>
<p class="subtitle">极简新中式 · 氛围增强版</p>

<div class="mockup">
  <div class="mockup-header">Preview: 节气页面布局</div>
  <div class="mockup-body">
    <div style="position:relative;width:100%;height:400px;background:linear-gradient(180deg,#f8f6f3 0%,#e8e4df 100%);border-radius:8px;overflow:hidden;font-family:'Noto Serif SC',serif;">

      <!-- 动态背景层 (SVG云雾) -->
      <div style="position:absolute;inset:0;opacity:0.3;">
        <svg width="100%" height="100%" viewBox="0 0 400 400" preserveAspectRatio="none">
          <defs>
            <linearGradient id="mistGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#d4cfc9;stop-opacity:0.8"/>
              <stop offset="100%" style="stop-color:#c9c4bd;stop-opacity:0.3"/>
            </linearGradient>
          </defs>
          <path d="M0,200 Q100,180 200,200 T400,200 L400,400 L0,400 Z" fill="url(#mistGrad)">
            <animate attributeName="d" dur="8s" repeatCount="indefinite"
              values="M0,200 Q100,180 200,200 T400,200 L400,400 L0,400 Z;
                      M0,210 Q100,190 200,210 T400,210 L400,400 L0,400 Z;
                      M0,200 Q100,180 200,200 T400,200 L400,400 L0,400 Z"/>
          </path>
        </svg>
      </div>

      <!-- 中心内容 -->
      <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#2c2c2c;">
        <div style="font-size:14px;letter-spacing:8px;color:#8a8580;margin-bottom:16px;">立 春</div>
        <div style="font-size:48px;font-weight:300;letter-spacing:4px;margin-bottom:24px;">春风如贵客</div>
        <div style="font-size:16px;color:#6b6560;font-style:italic;letter-spacing:2px;">一夜东风起，万物竞生辉</div>
      </div>

      <!-- 左右切换按钮 -->
      <div style="position:absolute;left:20px;top:50%;transform:translateY(-50%);width:40px;height:40px;display:flex;align-items:center;justify-content:center;color:#8a8580;font-size:24px;cursor:pointer;border:1px solid rgba(0,0,0,0.1);border-radius:50%;">‹</div>
      <div style="position:absolute;right:20px;top:50%;transform:translateY(-50%);width:40px;height:40px;display:flex;align-items:center;justify-content:center;color:#8a8580;font-size:24px;cursor:pointer;border:1px solid rgba(0,0,0,0.1);border-radius:50%;">›</div>

      <!-- 底部导航 -->
      <div style="position:absolute;bottom:30px;left:50%;transform:translateX(-50%);display:flex;gap:8px;">
        <div style="width:6px;height:6px;border-radius:50%;background:#2c2c2c;"></div>
        <div style="width:6px;height:6px;border-radius:50%;background:#d4cfc9;"></div>
        <div style="width:6px;height:6px;border-radius:50%;background:#d4cfc9;"></div>
        <div style="width:6px;height:6px;border-radius:50%;background:#d4cfc9;"></div>
        <div style="width:6px;height:6px;border-radius:50%;background:#d4cfc9;"></div>
      </div>

      <!-- 节气描述卡片 (展开时) -->
      <div style="position:absolute;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,0.9);padding:20px 32px;border-radius:4px;box-shadow:0 4px 20px rgba(0,0,0,0.05);max-width:400px;text-align:center;">
        <div style="font-size:13px;line-height:1.8;color:#5a5550;letter-spacing:1px;">
          立春是二十四节气之首，标志着冬季结束、春季开始
        </div>
      </div>
    </div>
  </div>
</div>

<div style="margin-top:24px;">
  <h3>布局要点</h3>
  <ul style="color:#5a5550;line-height:2;">
    <li><strong>全屏沉浸</strong> — 占据整个视口，无传统导航栏</li>
    <li><strong>中心留白</strong> — 内容垂直水平居中，呼吸感强</li>
    <li><strong>微妙动效</strong> — 背景SVG云雾缓慢流动</li>
    <li><strong>键盘支持</strong> — 左右箭头切换，底部圆点指示器</li>
  </ul>
</div>
