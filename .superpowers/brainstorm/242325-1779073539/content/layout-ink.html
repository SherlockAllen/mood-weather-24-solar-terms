<h2>全屏轮播布局示意 · 传统水墨风</h2>
<p class="subtitle">浓淡干湿 · 意境悠远</p>

<div class="split">
  <div class="mockup">
    <div class="mockup-header">水墨风格</div>
    <div class="mockup-body">
      <div style="position:relative;width:100%;height:350px;background:#f5f5f0;border-radius:8px;overflow:hidden;">

        <!-- 水墨云雾层 -->
        <div style="position:absolute;inset:0;">
          <svg width="100%" height="100%" viewBox="0 0 400 350" preserveAspectRatio="none">
            <defs>
              <filter id="inkBlur">
                <feGaussianBlur stdDeviation="3"/>
              </filter>
              <linearGradient id="inkGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#2a2a2a;stop-opacity:0.15"/>
                <stop offset="50%" style="stop-color:#3a3a3a;stop-opacity:0.08"/>
                <stop offset="100%" style="stop-color:#1a1a1a;stop-opacity:0.12"/>
              </linearGradient>
            </defs>
            <!-- 远山剪影 -->
            <path d="M0,250 Q80,180 150,220 Q200,160 280,200 Q340,140 400,180 L400,350 L0,350 Z" fill="#e0ddd5" opacity="0.6"/>
            <path d="M0,280 Q100,220 180,260 Q250,200 320,240 Q380,190 400,210 L400,350 L0,350 Z" fill="#d5d0c8" opacity="0.8"/>
            <!-- 墨迹晕染 -->
            <ellipse cx="320" cy="100" rx="120" ry="80" fill="url(#inkGrad1)" filter="url(#inkBlur)">
              <animate attributeName="cx" dur="12s" repeatCount="indefinite" values="320;340;320"/>
            </ellipse>
            <ellipse cx="100" cy="280" rx="100" ry="60" fill="#2a2a2a" opacity="0.05" filter="url(#inkBlur)">
              <animate attributeName="cx" dur="15s" repeatCount="indefinite" values="100;80;100"/>
            </ellipse>
          </svg>
        </div>

        <!-- 飘落墨点 -->
        <div style="position:absolute;top:60px;left:30%;width:3px;height:3px;background:#2a2a2a;border-radius:50%;opacity:0.4;">
          <animate attributeName="cy" dur="8s" repeatCount="indefinite" values="60;280;60"/>
          <animate attributeName="opacity" dur="8s" repeatCount="indefinite" values="0.4;0;0.4"/>
        </div>
        <div style="position:absolute;top:40px;left:60%;width:2px;height:2px;background:#3a3a3a;border-radius:50%;opacity:0.3;">
          <animate attributeName="cy" dur="10s" repeatCount="indefinite" values="40;300;40"/>
          <animate attributeName="opacity" dur="10s" repeatCount="indefinite" values="0.3;0;0.3"/>
        </div>

        <!-- 中心内容 -->
        <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#1a1a1a;">
          <div style="font-size:12px;letter-spacing:12px;color:#6a6a6a;margin-bottom:20px;font-family:'Songti SC',serif;">立 春</div>
          <div style="font-size:36px;font-weight:400;letter-spacing:6px;margin-bottom:24px;font-family:'Kaiti SC',serif;">春风如贵客</div>
          <div style="font-size:14px;color:#5a5a5a;font-style:italic;letter-spacing:3px;font-family:'Kaiti SC',serif;">一夜东风起，万物竞生辉</div>
        </div>

        <!-- 左右切换 -->
        <div style="position:absolute;left:16px;top:50%;transform:translateY(-50%);width:36px;height:36px;display:flex;align-items:center;justify-content:center;color:#4a4a4a;font-size:28px;border:1px solid rgba(0,0,0,0.15);border-radius:50%;">‹</div>
        <div style="position:absolute;right:16px;top:50%;transform:translateY(-50%);width:36px;height:36px;display:flex;align-items:center;justify-content:center;color:#4a4a4a;font-size:28px;border:1px solid rgba(0,0,0,0.15);border-radius:50%;">›</div>

        <!-- 底部指示 -->
        <div style="position:absolute;bottom:24px;left:50%;transform:translateX(-50%);display:flex;gap:10px;">
          <div style="width:5px;height:5px;border-radius:50%;background:#1a1a1a;"></div>
          <div style="width:5px;height:5px;border-radius:50%;background:#b0aaa0;"></div>
          <div style="width:5px;height:5px;border-radius:50%;background:#b0aaa0;"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="mockup">
    <div class="mockup-header">极简新中式</div>
    <div class="mockup-body">
      <div style="position:relative;width:100%;height:350px;background:linear-gradient(180deg,#f8f6f3 0%,#e8e4df 100%);border-radius:8px;overflow:hidden;">

        <!-- 暖色云雾 -->
        <div style="position:absolute;inset:0;opacity:0.3;">
          <svg width="100%" height="100%" viewBox="0 0 400 350" preserveAspectRatio="none">
            <defs>
              <linearGradient id="warmMist" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#d4cfc9;stop-opacity:0.8"/>
                <stop offset="100%" style="stop-color:#c9c4bd;stop-opacity:0.3"/>
              </linearGradient>
            </defs>
            <path d="M0,180 Q100,160 200,180 T400,180 L400,350 L0,350 Z" fill="url(#warmMist)">
              <animate attributeName="d" dur="8s" repeatCount="indefinite"
                values="M0,180 Q100,160 200,180 T400,180 L400,350 L0,350 Z;
                        M0,190 Q100,170 200,190 T400,190 L400,350 L0,350 Z;
                        M0,180 Q100,160 200,180 T400,180 L400,350 L0,350 Z"/>
            </path>
          </svg>
        </div>

        <!-- 中心内容 -->
        <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#2c2c2c;">
          <div style="font-size:13px;letter-spacing:8px;color:#8a8580;margin-bottom:16px;">立 春</div>
          <div style="font-size:38px;font-weight:300;letter-spacing:4px;margin-bottom:20px;">春风如贵客</div>
          <div style="font-size:15px;color:#6b6560;font-style:italic;letter-spacing:2px;">一夜东风起，万物竞生辉</div>
        </div>

        <!-- 左右切换 -->
        <div style="position:absolute;left:20px;top:50%;transform:translateY(-50%);width:40px;height:40px;display:flex;align-items:center;justify-content:center;color:#8a8580;font-size:24px;border:1px solid rgba(0,0,0,0.1);border-radius:50%;">‹</div>
        <div style="position:absolute;right:20px;top:50%;transform:translateY(-50%);width:40px;height:40px;display:flex;align-items:center;justify-content:center;color:#8a8580;font-size:24px;border:1px solid rgba(0,0,0,0.1);border-radius:50%;">›</div>

        <!-- 底部指示 -->
        <div style="position:absolute;bottom:24px;left:50%;transform:translateX(-50%);display:flex;gap:8px;">
          <div style="width:6px;height:6px;border-radius:50%;background:#2c2c2c;"></div>
          <div style="width:6px;height:6px;border-radius:50%;background:#d4cfc9;"></div>
          <div style="width:6px;height:6px;border-radius:50%;background:#d4cfc9;"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<div style="margin-top:24px;">
  <h3>两种风格对比</h3>
  <div class="pros-cons">
    <div class="pros">
      <h4>水墨风 · 传统</h4>
      <ul>
        <li>意境深远，辨识度高</li>
        <li>墨迹动画有文人气质</li>
        <li>与24节气传统文化契合</li>
      </ul>
      <h4 style="margin-top:12px;">新中式 · 现代</h4>
      <ul>
        <li>色彩温和，接受度广</li>
        <li>留白 + 暖色调更舒适</li>
        <li>适合移动端展示</li>
      </ul>
    </div>
    <div class="cons">
      <h4>水墨风 · 传统</h4>
      <ul>
        <li>黑白为主较沉闷</li>
        <li>部分评委可能觉得"旧"</li>
      </ul>
      <h4 style="margin-top:12px;">新中式 · 现代</h4>
      <ul>
        <li>辨识度不如水墨</li>
        <li>与常规网页风格接近</li>
      </ul>
    </div>
  </div>
</div>

<p style="margin-top:20px;color:#5a5550;text-align:center;">你更倾向哪种风格？</p>
